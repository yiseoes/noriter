spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: true

  sql:
    init:
      mode: never

noriter:
  workspace:
    path: ./test-workspace
  claude:
    model: claude-sonnet-4-6
  pipeline:
    timeout: 60000
    stage-timeout: 10000
    max-debug-attempts: 3
