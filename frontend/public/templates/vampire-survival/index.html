<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뱀파이어 서바이벌</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div id="hpBar"><div id="hpFill"></div><span id="hpText"></span></div>
    <div id="xpBar"><div id="xpFill"></div><span id="xpText"></span></div>
    <div id="info"><span id="level">Lv.1</span><span id="timer">0:00</span><span id="kills">0 KILLS</span></div>
  </div>
  <div id="levelUp" class="hidden">
    <h2>⚡ 레벨 업!</h2>
    <p>스킬을 선택하세요</p>
    <div id="skills"></div>
  </div>
  <div id="gameOver" class="hidden">
    <h2>💀 게임 오버</h2>
    <p id="finalScore"></p>
    <button onclick="location.reload()">다시 하기</button>
  </div>
  <div id="startScreen">
    <h1>🍁 메이플 어드벤처</h1>
    <p>귀여운 몬스터를 때려잡고 레벨업하세요!</p>
    <p class="hint">← → 이동 · ↑/Space 점프 · Z/X 공격</p>
    <button onclick="startGame()">게임 시작</button>
  </div>
  <script src="game.js"></script>
</body>
</html>
